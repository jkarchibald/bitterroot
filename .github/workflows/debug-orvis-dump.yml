# version: debug-orvis-dump-8-3.yml
# TEMPORARY debug workflow (Phase 8, Chat 3 pre-work). NOT part of the pipeline.
# Purpose: the scraper's field parsers were built against fixtures; the live
# Orvis DOM differs (reportDate came back empty on run #2, skipping all sources).
# This job fetches the real pages from the GitHub runner (which CAN reach
# orvis.com, unlike the dev sandbox), prints targeted diagnostics, AND uploads
# the raw HTML as a downloadable artifact so the parsers can be fixed against
# reality. Delete this workflow once the parsers are patched.
name: debug-orvis-dump

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live Orvis pages
        run: |
          set -uo pipefail
          mkdir -p /tmp/orvis
          UA="Mozilla/5.0 (compatible; CFTF-shop-scraper/1.0; +https://jkarchibald.github.io/bitterroot/)"
          for slug in west-fork-bitterroot-river east-fork-bitterroot-river bitterroot-river; do
            echo "############################################################"
            echo "### $slug"
            echo "############################################################"
            code=$(curl -sS -A "$UA" -w '%{http_code}' \
              "https://fishingreports.orvis.com/west/montana/$slug" \
              -o "/tmp/orvis/$slug.html")
            echo "HTTP $code   bytes: $(wc -c < /tmp/orvis/$slug.html)"
          done

      - name: Diagnostics — bitterroot mainstem (representative)
        run: |
          f=/tmp/orvis/bitterroot-river.html
          echo "===== DATE-ish ====="
          grep -niE 'datetime|report[-_ ]?date|"date"|posted|updated|published|<time' "$f" | head -40
          echo
          echo "===== RATING (amCharts / chart.data / rating words) ====="
          grep -niE 'chart\.data|"rating"|"number"|Poor|Standard|Excellent|GaugeChart|report-condition-rating' "$f" | head -40
          echo
          echo "===== FLY TABLE (attrs / rows) ====="
          grep -niE 'data-shop-name|data-shop-id|fly-row|recommended-fl|class="[^"]*fly' "$f" | head -40
          echo
          echo "===== WATER TEMP ====="
          grep -niE 'water[ -]?temp|°F|&deg;F|degF|water-temperature' "$f" | head -20
          echo
          echo "===== AUTHOR / REPORTER ====="
          grep -niE 'report-author|reporter|byline|by |guide' "$f" | head -20
          echo
          echo "===== HATCHES / BEST TIME / TECHNIQUE ====="
          grep -niE 'hatch|best[ -]?time|best fishing|technique' "$f" | head -30
          echo
          echo "===== is the page even server-rendered? (title + first 40 non-blank lines) ====="
          grep -iE '<title' "$f" | head -3
          grep -vE '^\s*$' "$f" | head -40

      - name: Upload raw HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: orvis-raw-html
          path: /tmp/orvis/*.html
          retention-days: 3
